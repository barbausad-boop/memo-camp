<!-- ================================= -->
<!-- PARCOURS DE FORMATION -->
<!-- ================================= -->

<div class="card">

  <h2>Parcours de Formation</h2>

  <!-- ======================= -->
  <!-- CI -->
  <!-- ======================= -->

  <label>

    <input type="checkbox"
           id="ci_check"
           onchange="toggleCI()">

    CI - Camp d’Initiation

  </label>

  <div id="ci_block"
       style="display:none;">

    <input type="number"
           id="ci_annee"
           placeholder="Année CI">

    <input type="text"
           id="ci_lieu"
           placeholder="Lieu CI">

  </div>

  <hr>

  <!-- ======================= -->
  <!-- CEP -->
  <!-- ======================= -->

  <label>

    <input type="checkbox"
           id="cep_check"
           onchange="toggleCEP()">

    CEP - Camp École Préparatoire

  </label>

  <div id="cep_block"
       style="display:none;">

    <select id="cep_branche">

      <option value="">
        Choisir Branche CEP
      </option>

      <option value="Jaune">
        Jaune - Louveteaux
      </option>

      <option value="Verte">
        Verte - Éclaireurs
      </option>

      <option value="Rouge">
        Rouge - Aînés / Routiers
      </option>

    </select>

    <input type="number"
           id="cep_annee"
           placeholder="Année CEP">

    <input type="text"
           id="cep_lieu"
           placeholder="Lieu CEP">

  </div>

  <hr>

  <!-- ======================= -->
  <!-- CNB -->
  <!-- ======================= -->

  <label>

    <input type="checkbox"
           id="cnb_check"
           onchange="toggleCNB()">

    CNB - Camp National de Branches

  </label>

  <div id="cnb_block"
       style="display:none;">

    <select id="cnb_branche">

      <option value="">
        Choisir Branche CNB
      </option>

      <option value="Jaune">
        Jaune - Louveteaux
      </option>

      <option value="Verte">
        Verte - Éclaireurs
      </option>

      <option value="Rouge">
        Rouge - Aînés / Routiers
      </option>

    </select>

    <input type="number"
           id="cnb_annee"
           placeholder="Année CNB">

    <input type="text"
           id="cnb_lieu"
           placeholder="Lieu CNB">

  </div>

  <hr>

  <!-- ======================= -->
  <!-- CBB -->
  <!-- ======================= -->

  <label>

    <input type="checkbox"
           id="cbb_check"
           onchange="toggleCBB()">

    CBB - Camp Badge de Bois

  </label>

  <div id="cbb_block"
       style="display:none;">

    <input type="number"
           id="cbb_annee"
           placeholder="Année CBB">

    <input type="text"
           id="cbb_lieu"
           placeholder="Lieu CBB">

  </div>

  <hr>

  <button onclick="enregistrerParcours()">

    Enregistrer Parcours Complet

  </button>

  <div id="formationMessage"></div>

</div>
