<!DOCTYPE html>
<html>

<head>
  <title>Memo Camp</title>
</head>

<body>

<h1>Memo Camp 🚀</h1>

<input id="nom" placeholder="Nom du participant">

<button onclick="ajouterParticipant()">
Ajouter participant
</button>

<button onclick="testConnexion()">
Tester Supabase
</button>

<p id="resultat"></p>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://kcmccilvysxbofjmbktz.supabase.co'

const supabaseKey = 'sb_publishable_hvooCYZnXQxo88-EptoXCA_CBqtmBFR'

const supabase = createClient(supabaseUrl, supabaseKey)

window.ajouterParticipant = async () => {

  const nom = document.getElementById('nom').value

  const { error } = await supabase
    .from('test')
    .insert([{ nom }])

  document.getElementById('resultat').innerText =
    error ? error.message : 'Participant ajouté ✅'

}

window.testConnexion = async () => {

  const { error } = await supabase
    .from('participants')
    .select('*')

  document.getElementById('resultat').innerText =
    error ? error.message : 'Connexion réussie ✅'

}

</script>

</body>
</html>
