<!DOCTYPE html>
<html>

<head>
  <title>Memo Camp</title>
</head>

<body>

<h1>Memo Camp 🚀</h1>

<input id="prenom" placeholder="Prénom">
<br><br>

<input id="nom" placeholder="Nom">
<br><br>

<input id="telephone" placeholder="Téléphone">
<br><br>

<input id="email" placeholder="Email">
<br><br>

<button onclick="ajouterParticipant()">
Ajouter participant
</button>

<p id="resultat"></p>

<h2>Participants enregistrés</h2>

<div id="listeParticipants"></div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://kcmccilvysxbofjmbktz.supabase.co'

const supabaseKey = 'sb_publishable_hvooCYZnXQxo88-EptoXCA_CBqtmBFR'

const supabase = createClient(supabaseUrl, supabaseKey)

window.ajouterParticipant = async () => {

const first_name = document.getElementById('prenom').value
const last_name = document.getElementById('nom').value
const phone = document.getElementById('telephone').value
const email = document.getElementById('email').value

const { error } = await supabase
.from('participants')
.insert([
{
first_name,
last_name,
phone,
email
}
])

document.getElementById('resultat').innerText =
error ? error.message : 'Participant ajouté ✅'

chargerParticipants()

}

async function chargerParticipants() {

const { data, error } = await supabase
.from('participants')
.select('*')

let html = ''

data.forEach(participant => {

html += `
<div style="border:1px solid #ccc; padding:10px; margin:10px;">
<b>${participant.first_name} ${participant.last_name}</b><br>
📞 ${participant.phone}<br>
📧 ${participant.email}
</div>
`

})

document.getElementById('listeParticipants').innerHTML = html

}

chargerParticipants()

</script>

</body>

</html>
