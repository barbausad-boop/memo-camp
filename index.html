<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

  // =====================================
  // CONFIGURATION SUPABASE
  // =====================================

  const SUPABASE_URL = "https://kcmccilvysxbofjmbktz.supabase.co";

  const SUPABASE_ANON_KEY =
    "sb_publishable_hvooCYZnXQxo88-EptoXCA_CBqtmBFR";

  const client = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  // =====================================
  // FORMULAIRE
  // =====================================

  const form = document.getElementById("memoForm");

  form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const message =
      document.getElementById("message");

    message.innerHTML =
      "Enregistrement en cours...";

    // =====================================
    // DONNÉES PARTICIPANT
    // =====================================

    const participant = {

      first_name:
        document.getElementById("prenom").value,

      last_name:
        document.getElementById("nom").value,

      date_naissance:
        document.getElementById("date_naissance").value,

      lieu_naissance:
        document.getElementById("lieu_naissance").value,

      phone:
        document.getElementById("telephone").value,

      email:
        document.getElementById("email").value,

      adresse:
        document.getElementById("adresse").value,

      groupe_scout:
        document.getElementById("groupe_scout").value,

      district:
        document.getElementById("district").value,

      region:
        document.getElementById("region").value

    };

    // =====================================
    // RECHERCHER PARTICIPANT EXISTANT
    // =====================================

    const { data: existingParticipant } =
      await client
      .from("participants")
      .select("*")
      .eq("first_name", participant.first_name)
      .eq("last_name", participant.last_name)
      .maybeSingle();

    let participantId;

    // =====================================
    // SI LE PARTICIPANT EXISTE
    // =====================================

    if(existingParticipant){

      participantId = existingParticipant.id;

    } else {

      // =====================================
      // AJOUT PARTICIPANT
      // =====================================

      const { data, error } =
        await client
        .from("participants")
        .insert([participant])
        .select();

      if(error){

        message.innerHTML = error.message;
        return;

      }

      participantId = data[0].id;

    }

    // =====================================
    // DONNÉES FORMATION
    // =====================================

    const formation = {

      participant_id: participantId,

      stage:
        document.getElementById("stage").value,

      branche:
        document.getElementById("branche").value,

      sous_camp:
        document.getElementById("sous_camp").value,

      promotion:
        document.getElementById("promotion").value,

      annee:
        parseInt(
          document.getElementById("annee").value
        ),

      lieu_formation:
        document.getElementById("lieu_formation").value,

      formateur:
        document.getElementById("formateur").value

    };

    // =====================================
    // AJOUT FORMATION
    // =====================================

    const { error: formationError } =
      await client
      .from("formations_suivies")
      .insert([formation]);

    if(formationError){

      message.innerHTML =
        formationError.message;

      return;

    }

    // =====================================
    // SUCCÈS
    // =====================================

    message.innerHTML =
      "Participant enregistré avec succès.";

    form.reset();

  });

</script>
