<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Memo Camp</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      padding:20px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    h2{
      margin-top:30px;
      color:#333;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:25px;
      border:none;
      background:#0066cc;
      color:white;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover{
      background:#004999;
    }

    .message{
      margin-top:20px;
      text-align:center;
      font-weight:bold;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>MEMO CAMP</h1>

  <form id="memoForm">

    <h2>Informations Personnelles</h2>

    <input type="text" id="prenom" placeholder="Prénom" required>
    <input type="text" id="nom" placeholder="Nom" required>

    <input type="date" id="date_naissance">

    <input type="text" id="lieu_naissance" placeholder="Lieu de naissance">

    <input type="text" id="telephone" placeholder="Téléphone">

    <input type="email" id="email" placeholder="Email">

    <input type="text" id="adresse" placeholder="Adresse">

    <input type="text" id="groupe_scout" placeholder="Groupe Scout">

    <input type="text" id="district" placeholder="District">

    <input type="text" id="region" placeholder="Région">

    <h2>Formation Suivie</h2>

    <input type="text" id="stage" placeholder="Stage">

    <input type="text" id="branche" placeholder="Branche">

    <input type="text" id="sous_camp" placeholder="Sous-camp">

    <input type="text" id="promotion" placeholder="Promotion">

    <input type="number" id="annee" placeholder="Année">

    <input type="text" id="lieu_formation" placeholder="Lieu de formation">

    <input type="text" id="formateur" placeholder="Formateur">

    <button type="submit">Enregistrer</button>

  </form>

  <div class="message" id="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

  // =====================================
  // CONFIGURATION SUPABASE
  // =====================================

  const SUPABASE_URL = "https://kcmccilvysxbofjmbktz.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_hvooCYZnXQxo88-EptoXCA_CBqtmBFR";

  const client = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  // =====================================
  // FORMULAIRE
  // =====================================

  const form = document.getElementById("memoForm");

  form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const message = document.getElementById("message");

    message.innerHTML = "Enregistrement en cours...";

    // ==========================
    // DONNÉES PARTICIPANT
    // ==========================

    const participant = {

      prenom:
        document.getElementById("prenom").value,

      nom:
        document.getElementById("nom").value,

      date_naissance:
        document.getElementById("date_naissance").value,

      lieu_naissance:
        document.getElementById("lieu_naissance").value,

      telephone:
        document.getElementById("telephone").value,

      email:
        document.getElementById("email").value,

      adresse:
        document.getElementById("adresse").value,

      groupe_scout:
        document.getElementById("groupe_scout").value,

      district:
        document.getElementById("district").value,

      region:
        document.getElementById("region").value

    };

    // ==========================
    // VÉRIFIER SI EXISTE
    // ==========================

    const { data: existingParticipant } =
      await client
      .from("participants")
      .select("*")
      .eq("prenom", participant.prenom)
      .eq("nom", participant.nom)
      .maybeSingle();

    let participantId;

    // ==========================
    // SI EXISTE
    // ==========================

    if(existingParticipant){

      participantId = existingParticipant.id;

    } else {

      // ==========================
      // AJOUT PARTICIPANT
      // ==========================

      const { data, error } =
        await client
        .from("participants")
        .insert([participant])
        .select();

      if(error){

        message.innerHTML = error.message;
        return;

      }

      participantId = data[0].id;

    }

    // ==========================
    // DONNÉES FORMATION
    // ==========================

    const formation = {

      participant_id: participantId,

      stage:
        document.getElementById("stage").value,

      branche:
        document.getElementById("branche").value,

      sous_camp:
        document.getElementById("sous_camp").value,

      promotion:
        document.getElementById("promotion").value,

      annee:
        document.getElementById("annee").value,

      lieu_formation:
        document.getElementById("lieu_formation").value,

      formateur:
        document.getElementById("formateur").value

    };

    // ==========================
    // AJOUT FORMATION
    // ==========================

    const { error: formationError } =
      await client
      .from("formations_suivies")
      .insert([formation]);

    if(formationError){

      message.innerHTML = formationError.message;
      return;

    }

    message.innerHTML =
      "Participant enregistré avec succès.";

    form.reset();

  });

</script>

</body>
</html>
